services:
  seaforge:
    build: .
    container_name: seaforge
    ports:
      - "5001:5000"
    volumes:
      # Persist database outside container
      - ./data:/app/data
    environment:
      - SEAFORGE_HOST=0.0.0.0
      - SEAFORGE_PORT=5000
      - SEAFORGE_DB_PATH=data/seaforge.db
      - SEAFORGE_SECRET_KEY=${SEAFORGE_SECRET_KEY:-change-me-before-deploying}
      - AISSTREAM_API_KEY=${AISSTREAM_API_KEY:-}
    restart: unless-stopped
